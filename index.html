<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Scroll Guardian Prototype</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <!-- (Le contenu existant reste inchangé...) -->
    <script>
        // Enregistrement du robot DevOps (Service Worker)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Guardian Mobile Ready!', reg))
                    .catch(err => console.log('DevOps Error:', err));
            });
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
